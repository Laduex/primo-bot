services:
  primo-bot:
    container_name: primo-bot
    build:
      context: .
    image: saseq/primo-bot:latest
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./data:/data
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      FORUM_AUTO_MENTION_TARGETS: ${FORUM_AUTO_MENTION_TARGETS:-}
      ORDER_REMINDER_CONFIG_PATH: ${ORDER_REMINDER_CONFIG_PATH:-/data/orders-reminder-config.json}
      ORDER_REMINDER_DEFAULT_ENABLED: ${ORDER_REMINDER_DEFAULT_ENABLED:-true}
      ORDER_REMINDER_DEFAULT_TIME: ${ORDER_REMINDER_DEFAULT_TIME:-08:00}
      ORDER_REMINDER_DEFAULT_TIMEZONE: ${ORDER_REMINDER_DEFAULT_TIMEZONE:-Asia/Manila}
      ORDER_REMINDER_DEFAULT_ROUTES: ${ORDER_REMINDER_DEFAULT_ROUTES:-}
      SALES_REPORT_CONFIG_PATH: ${SALES_REPORT_CONFIG_PATH:-/data/sales-report-config.json}
      SALES_REPORT_DEFAULT_ENABLED: ${SALES_REPORT_DEFAULT_ENABLED:-true}
      SALES_REPORT_DEFAULT_TIMEZONE: ${SALES_REPORT_DEFAULT_TIMEZONE:-Asia/Manila}
      SALES_REPORT_DEFAULT_TIMES: ${SALES_REPORT_DEFAULT_TIMES:-09:00,12:00,15:00,18:00,21:00}
      SALES_REPORT_DEFAULT_TARGET_CHANNEL_ID: ${SALES_REPORT_DEFAULT_TARGET_CHANNEL_ID:-}
      SALES_REPORT_DEFAULT_TONE: ${SALES_REPORT_DEFAULT_TONE:-casual}
      SALES_REPORT_DEFAULT_SIGNATURE: ${SALES_REPORT_DEFAULT_SIGNATURE:-Thanks, Primo}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8086/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  primo-bot-python-canary:
    container_name: primo-bot-python-canary
    profiles:
      - python-canary
    build:
      context: .
      dockerfile: Dockerfile.python
    image: saseq/primo-bot-python-canary:latest
    restart: unless-stopped
    ports:
      - "18086:8086"
    env_file:
      - .env
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8086/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
